<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Kho Văn Bản Trung đoàn 24</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(0, 0, 0, .6), rgba(0, 0, 0, .6)),
                url('https://vstatic.vietnam.vn/vietnam/resource/IMAGE/2026/02/23/1771801339865_255321603pm.jpeg');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            width: 400px;
            padding: 40px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;

            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);

            text-align: center;
        }

        .login-box::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            opacity: .08;
            background: url("https://upload.wikimedia.org/wikipedia/commons/a/a3/Emblem_of_Vietnam.svg") center/contain no-repeat;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo {
            width: 90px;
            margin-bottom: 15px;
        }

        h1 {
            color: #fff;
        }

        .subtitle {
            color: rgba(231, 222, 222, 0.85);
        }

        .footer {
            color: rgba(255, 255, 255, .75);
        }

        .subtitle {
            color: #ffffff;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            height: 54px;
            padding: 0 18px;
            /* thêm khoảng cách trái phải */
            background: rgba(255, 255, 255, .15);
            color: #fff;

            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 14px;

            backdrop-filter: blur(8px);
        }

        .input-group input:focus {
            border-color: #1f3b2d;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, .75);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #1f3b2d;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #2d5541;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }

        .error {
            display: none;
            background: #fdecec;
            color: #c62828;
            border: 1px solid #f5c2c7;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 18px;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
        }

        .error::before {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            margin-right: 8px;
            border-radius: 50%;
            background: #c62828;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        /* Mobile */
        @media (max-width: 768px) {

            body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background:
                    linear-gradient(rgba(0, 0, 0, .6), rgba(0, 0, 0, .6)),
                    url('https://vstatic.vietnam.vn/vietnam/resource/IMAGE/2026/02/23/1771801339865_255321603pm.jpeg');
                background-size: cover;
                background-position: center;
            }

            .login-box {
                width: 400px;
                padding: 40px;

                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);

                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 24px;

                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.35),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25);

                text-align: center;
            }

            .login-box::before {
                content: "";
                position: absolute;
                width: 180px;
                height: 180px;

                background: url("https://upload.wikimedia.org/wikipedia/commons/a/a3/Emblem_of_Vietnam.svg") center/contain no-repeat;

                opacity: .08;

                top: 30px;
                left: 50%;
                transform: translateX(-50%);
            }

            .logo {
                width: 75px;
            }

            h1 {
                color: #fff;
            }

            .subtitle {
                color: rgba(255, 255, 255, .85);
            }

            .footer {
                color: rgba(255, 255, 255, .75);
            }

            .subtitle {
                font-size: 14px;
                margin-bottom: 20px;
            }

            .input-group input {
                width: 100%;
                height: 54px;

                background: rgba(255, 255, 255, .15);
                color: #fff;

                border: 1px solid rgba(255, 255, 255, .2);
                border-radius: 14px;

                backdrop-filter: blur(8px);
            }

            .input-group input::placeholder {
                color: rgba(255, 255, 255, .75);
            }

            button {
                height: 54px;

                background: rgba(31, 59, 45, .8);
                color: #fff;

                border: 1px solid rgba(255, 255, 255, .15);
                border-radius: 14px;

                backdrop-filter: blur(10px);
            }

            button:hover {
                background: rgba(45, 85, 65, .95);
            }

            .error {
                font-size: 13px;
                padding: 10px 12px;
            }
        }

        /* Điện thoại nhỏ */
        @media (max-width: 480px) {

            .login-box {
                width: 400px;
                padding: 40px;

                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(18px);
                -webkit-backdrop-filter: blur(18px);

                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 24px;

                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.35),
                    inset 0 1px 0 rgba(255, 255, 255, 0.25);

                text-align: center;
            }

            .login-box::before {
                content: "";
                position: absolute;
                width: 180px;
                height: 180px;

                background: url("https://upload.wikimedia.org/wikipedia/commons/a/a3/Emblem_of_Vietnam.svg") center/contain no-repeat;

                opacity: .08;

                top: 30px;
                left: 50%;
                transform: translateX(-50%);
            }

            h1 {
                color: #fff;
            }

            .subtitle {
                color: rgba(255, 255, 255, .85);
            }

            .footer {
                color: rgba(255, 255, 255, .75);
            }

            .logo {
                width: 65px;
            }

            .subtitle {
                font-size: 13px;
            }
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(0, 0, 0, .6), rgba(0, 0, 0, .6)),
                url('https://vstatic.vietnam.vn/vietnam/resource/IMAGE/2026/02/23/1771801339865_255321603pm.jpeg');
            background-size: cover;
            background-position: center;
        }

        .input-group input {
            width: 100%;
            height: 54px;

            background: rgba(255, 255, 255, .15);
            color: #fff;

            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 14px;

            backdrop-filter: blur(8px);
        }

        .input-group input:focus {
            border-color: #1f3b2d;
            box-shadow: 0 0 0 4px rgba(31, 59, 45, .12);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, .75);
        }

        button {
            height: 54px;

            background: rgba(31, 59, 45, .8);
            color: #fff;

            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 14px;

            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(45, 85, 65, .95);
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>CỔNG THÔNG TIN TRUNG ĐOÀN</h1>
        <p class="subtitle">Trung đoàn 24 Trung Dũng</p>
        <p id="error-message" class="error"></p>
        <form onsubmit="return login()">
            <div class="input-group">
                <input type="text" id="username" placeholder="Tên đăng nhập" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu" required>
            </div>

            <button type="submit">Đăng nhập</button>
        </form>
        <script>
            function login() {

                const username =
                    document.getElementById("username").value;

                const password =
                    document.getElementById("password").value;

                const error =
                    document.getElementById("error-message");

                if (
                    username === "thuviene24" &&
                    password === "trungdung24021946"
                ) {

                    error.style.display = "block";
                    error.style.color = "#1f3b2d";
                    error.style.background = "#e8f5e9";
                    error.style.border = "1px solid #a5d6a7";

                    error.innerHTML =
                        "✓ Chào mừng đến với Cổng Thông Tin Trung đoàn 24";

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);

                    return false;
                }

                error.style.display = "block";
                error.style.color = "#c62828";
                error.style.background = "#fdecec";
                error.style.border = "1px solid #f5c2c7";

                error.innerHTML =
                    "✖ Sai tên đăng nhập hoặc mật khẩu";

                return false;
            }
        </script>
</body>

</html>
