<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Kho Văn Bản Trung đoàn 24</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1f3b2d, #355c4a);
        }

        .login-box {
            width: 400px;
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
            text-align: center;
        }

        .logo {
            width: 90px;
            margin-bottom: 15px;
        }

        h1 {
            color: #1f3b2d;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #1f3b2d;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #1f3b2d;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #2d5541;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <img src="images/logo.png" class="logo">

        <h1>KHO VĂN BẢN</h1>
        <p class="subtitle">Trung đoàn 24 Trung Dũng</p>

        <form action="index.html">
            <div class="input-group">
                <input type="thuviene24" placeholder="Tên đăng nhập" required>
            </div>

            <div class="input-group">
                <input type="trungdung24021946" placeholder="Mật khẩu" required>
            </div>

            <button type="submit">
                Đăng nhập
            </button>
        </form>

        <div class="footer">
            © Trung đoàn 24
        </div>

    </div>

</body>

</html>
